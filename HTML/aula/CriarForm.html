<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>encontre no google</title>
  </head>
  <body>
    <h1>Encontre no google</h1>
    <form action="https://www.google.com/">
      <label for="q">O que deseja pesquisar</label>
      <input
        type="text"
        id="q"
        name="q"
        placeholder="Degita o teu texto aqui"
        required
      />
      <input type="submit" value="pesquisar" />
    </form>
  </body>
</html>
