<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      Existem dois tipos de listas no html, as ordenadas e as nao ordenadas
    </h1>
    <br />
    <!--A tag para list nao ordenada eh UL, e a tag para os elementos dessa lista eh o LI-->
    <h2>Planetas nao ordenados</h2>
    <ul>
      <li>A</li>
      <li>B</li>
      <li>C</li>
      <li>D</li>
    </ul>
    <hr>
    <h2>Planetas ordenados</h2>
    <ol>
      <li>A</li>
      <li>B</li>
      <li>C</li>
      <li>D</li>
    </ol>
  </body>
</html>
